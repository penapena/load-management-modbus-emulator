    internal: true
  - platform: homeassistant
    id: ha_l3_reactive_export
    entity_id: sensor.momentary_reactive_export_phase_3
    internal: true
  - platform: homeassistant
    id: ha_total_reactive_import
    entity_id: sensor.momentary_reactive_import
