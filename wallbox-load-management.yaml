    internal: true
    force_update: true
  - platform: homeassistant
    id: ha_l3_power_exp_raw
    entity_id: sensor.momentary_active_export_phase_3
    internal: true
    force_update: true
  - platform: template
    id: ha_l3_power
    lambda: |-
      float imp = id(ha_l3_power_imp_raw).state;
      float exp = id(ha_l3_power_exp_raw).state;
      return (std::isnan(imp) ? 0.0f : imp) - (std::isnan(exp) ? 0.0f : exp);

  # --- Total: Import, Export -> Net kW (ha_total_power) ---
  - platform: homeassistant
    id: ha_total_power_imp_raw
    entity_id: sensor.momentary_active_import
    internal: true
    force_update: true
  - platform: homeassistant
    id: ha_total_power_exp_raw
    entity_id: sensor.momentary_active_export
    internal: true
    force_update: true
  - platform: template
    id: ha_total_power
    lambda: |-
      float imp = id(ha_total_power_imp_raw).state;
      float exp = id(ha_total_power_exp_raw).state;
      return (std::isnan(imp) ? 0.0f : imp) - (std::isnan(exp) ? 0.0f : exp);

  # --- Voltages (V) with Safety Filters ---
  - platform: homeassistant
    id: ha_l1_voltage
    entity_id: sensor.voltage_phase_1
    internal: true
    filters:
      - lambda: |-
          return std::isnan(x) ? 230.0f : x;
  - platform: homeassistant
    id: ha_l2_voltage
    entity_id: sensor.voltage_phase_2
    internal: true
    filters:
      - lambda: |- 
          return std::isnan(x) ? 230.0f : x;
  - platform: homeassistant
    id: ha_l3_voltage
    entity_id: sensor.voltage_phase_3
    internal: true
    filters:
      - lambda: |- 
          return std::isnan(x) ? 230.0f : x;

  # --- Currents (A) with Safety Filters ---
  - platform: homeassistant
    id: ha_l1_current
    entity_id: sensor.current_phase_1
    internal: true
    force_update: true
    filters:
      - lambda: |- 
          return std::isnan(x) ? 0.0f : x;
  - platform: homeassistant
    id: ha_l2_current
    entity_id: sensor.current_phase_2
    internal: true
    force_update: true
    filters:
      - lambda: |- 
          return std::isnan(x) ? 0.0f : x;
  - platform: homeassistant
    id: ha_l3_current
    entity_id: sensor.current_phase_3
    internal: true
    force_update: true
    filters:
      - lambda: |- 
          return std::isnan(x) ? 0.0f : x;

  # kvar sensors (Used for PF and VA calculations)
  - platform: homeassistant
    id: ha_l1_reactive_import
    entity_id: sensor.momentary_reactive_import_phase_1
    internal: true
  - platform: homeassistant
    id: ha_l1_reactive_export
    entity_id: sensor.momentary_reactive_export_phase_1
    internal: true
  - platform: homeassistant
    id: ha_l2_reactive_import
